name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Create the GitHub release draft with changelog before any build jobs run.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.changelog.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git-cliff needs full history

      - name: Generate changelog for this tag
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: "TRPG Workbench ${{ github.ref_name }}"
          body: |
            ${{ steps.changelog.outputs.content }}

            ---
            > ⚠️ 未签名测试版，macOS / Windows 首次运行需手动信任，详见 [README](https://github.com/${{ github.repository }}#安装)。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (aarch64)
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-13          # Intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest    # Windows x86_64
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install chmlib (macOS only)
        if: runner.os == 'macOS'
        run: brew install chmlib

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Python dependencies
        shell: bash
        run: |
          cd apps/backend
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv/Scripts/pip install -r requirements.txt pyinstaller
          else
            .venv/bin/pip install -r requirements.txt pyinstaller
          fi

      - name: Build PyInstaller sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          cd apps/backend
          .venv/bin/pyinstaller trpg-backend.spec
          cp dist/trpg-backend ../desktop/src-tauri/binaries/trpg-backend-${{ matrix.target }}

      - name: Build PyInstaller sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd apps/backend
          .venv/Scripts/pyinstaller trpg-backend.spec
          cp dist/trpg-backend.exe ../desktop/src-tauri/binaries/trpg-backend-${{ matrix.target }}.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "TRPG Workbench ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
