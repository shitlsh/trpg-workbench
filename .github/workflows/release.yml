name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (aarch64)
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-13          # Intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest    # Windows x86_64
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install chmlib (macOS only)
        if: runner.os == 'macOS'
        run: brew install chmlib

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Python dependencies
        shell: bash
        run: |
          cd apps/backend
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv/Scripts/pip install -r requirements.txt pyinstaller
          else
            .venv/bin/pip install -r requirements.txt pyinstaller
          fi

      - name: Build PyInstaller sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          cd apps/backend
          .venv/bin/pyinstaller trpg-backend.spec
          cp dist/trpg-backend ../desktop/src-tauri/binaries/trpg-backend-${{ matrix.target }}

      - name: Build PyInstaller sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd apps/backend
          .venv/Scripts/pyinstaller trpg-backend.spec
          cp dist/trpg-backend.exe ../desktop/src-tauri/binaries/trpg-backend-${{ matrix.target }}.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "TRPG Workbench ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          releaseBody: |
            ## TRPG Workbench ${{ github.ref_name }}

            ### 安装说明

            **macOS**: 下载 `.dmg` 文件，安装后如遇 Gatekeeper 阻止，右键点击应用选择「打开」，或前往「系统偏好设置 → 安全性与隐私」点击「仍要打开」。

            **Windows**: 下载 `.exe` 安装包，如遇 SmartScreen 提示，点击「更多信息 → 仍要运行」。

            > 本版本为未签名测试版（v0.1.0），代码签名将在后续版本加入。

            ### 数据目录

            运行时数据存储在 `~/trpg-workbench-data/`，可通过环境变量 `TRPG_DATA_DIR` 覆盖。
