name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    name: Create Draft Release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this tag
        id: changelog
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          BODY=$(awk "/^## ${TAG}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="No changelog entry found for ${TAG}."
          fi
          printf '%s\n\n---\n> ⚠️ 未签名测试版，macOS / Windows 首次运行需手动信任，详见 [README](https://github.com/%s#安装)。\n' \
            "$BODY" "${{ github.repository }}" > release_body.md

      - name: Create or update draft release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release edit "$TAG" \
              --draft \
              --title "TRPG Workbench ${TAG}" \
              --notes-file release_body.md
          else
            gh release create "$TAG" \
              --draft \
              --title "TRPG Workbench ${TAG}" \
              --notes-file release_body.md
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (aarch64)
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: windows-latest    # Windows x86_64
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.target }})
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install chmlib (macOS only)
        if: runner.os == 'macOS'
        run: brew install chmlib

      - name: Install Python dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          cd apps/backend
          python -m venv .venv
          CFLAGS="-I$(brew --prefix chmlib)/include" \
          LDFLAGS="-L$(brew --prefix chmlib)/lib" \
          .venv/bin/pip install -r requirements.txt pyinstaller

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd apps/backend
          python -m venv .venv
          # pychm (chmlib bindings) cannot be compiled on Windows — it requires POSIX headers.
          # Windows CHM support uses hh.exe -decompile instead (built into every Windows install).
          grep -v "^pychm" requirements.txt > requirements-win.txt
          .venv/Scripts/pip install -r requirements-win.txt pyinstaller

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build PyInstaller sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          cd apps/backend
          .venv/bin/pyinstaller trpg-backend.spec
          cp dist/trpg-backend ../desktop/src-tauri/binaries/trpg-backend-${{ matrix.target }}

      - name: Build PyInstaller sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd apps/backend
          .venv/Scripts/pyinstaller trpg-backend.spec
          cp dist/trpg-backend.exe ../desktop/src-tauri/binaries/trpg-backend-${{ matrix.target }}.exe

      - name: Build Tauri app and upload to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
