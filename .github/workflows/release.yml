name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (aarch64)
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-13          # Intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest    # Windows x86_64
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install chmlib (macOS only)
        if: runner.os == 'macOS'
        run: brew install chmlib

      - name: Install chmlib (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # vcpkg is pre-installed on GitHub Windows runners
          vcpkg install chmlib:x64-windows
          # Expose headers and libs so pychm can find them at compile time
          VCPKG_ROOT="${VCPKG_INSTALLATION_ROOT}"
          echo "INCLUDE=${VCPKG_ROOT}/installed/x64-windows/include;${INCLUDE}" >> "$GITHUB_ENV"
          echo "LIB=${VCPKG_ROOT}/installed/x64-windows/lib;${LIB}" >> "$GITHUB_ENV"
          echo "VCPKG_ROOT=${VCPKG_ROOT}" >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Python dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          cd apps/backend
          python -m venv .venv
          # Pass chmlib headers so pychm can compile against the brew-installed library
          CFLAGS="-I$(brew --prefix chmlib)/include" \
          LDFLAGS="-L$(brew --prefix chmlib)/lib" \
          .venv/bin/pip install -r requirements.txt pyinstaller

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd apps/backend
          python -m venv .venv
          # chmlib installed via vcpkg; INCLUDE/LIB env vars set in previous step
          .venv/Scripts/pip install -r requirements.txt pyinstaller

      - name: Build PyInstaller sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          cd apps/backend
          .venv/bin/pyinstaller trpg-backend.spec
          cp dist/trpg-backend ../desktop/src-tauri/binaries/trpg-backend-${{ matrix.target }}

      - name: Build PyInstaller sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd apps/backend
          # Copy vcpkg chmlib DLL into dist so PyInstaller bundles it
          VCPKG_BIN="${VCPKG_ROOT}/installed/x64-windows/bin"
          cp "${VCPKG_BIN}/chmlib.dll" . 2>/dev/null || true
          .venv/Scripts/pyinstaller trpg-backend.spec
          cp dist/trpg-backend.exe ../desktop/src-tauri/binaries/trpg-backend-${{ matrix.target }}.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          # Do NOT pass tagName/releaseName here — release creation is handled
          # by the publish-release job after all builds succeed.

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          retention-days: 1
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi.sig

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    name: Publish Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this tag
        id: changelog
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # Extract the section for this tag from CHANGELOG.md.
          # Section starts with "## vX.Y.Z" and ends before the next "## " heading.
          BODY=$(awk "/^## ${TAG}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="No changelog entry found for ${TAG}."
          fi
          # Append unsigned warning
          printf '%s\n\n---\n> ⚠️ 未签名测试版，macOS / Windows 首次运行需手动信任，详见 [README](https://github.com/%s#安装)。\n' \
            "$BODY" "${{ github.repository }}" > release_body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: "TRPG Workbench ${{ github.ref_name }}"
          body_path: release_body.md
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
